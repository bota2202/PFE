<!doctype html>
<html lang="pt_BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instagram</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="web/favicon-32x32.png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body>
    <div id="stories">
      <div class="story" id="story1">
        <img src="Imagens/bolsonaro.jpg" />
      </div>
      <div class="story" id="story2">
        <img src="Imagens/cr7.jpg"/>
      </div>
      <div class="story" id="story3">
        <img src="Imagens/diddy.jpg"/>
      </div>
      <div class="story" id="story4">
        <img src="Imagens/hugo.jpg"/>
      </div>
      <div class="story" id="story5">
        <img src="Imagens/lula.jpg"/>
      </div>
      <div class="story" id="story6">
        <img src="Imagens/messi.jpg"/>
      </div>
      <div class="story" id="story7">
        <img src="Imagens/michael.jpg"/>
      </div>
      <div class="story" id="story8">
        <img src="Imagens/neymar.jpg"/>
      </div>
      <div class="story" id="story9">
        <img src="Imagens/trump.jpg"/>
      </div>
      <div class="story" id="story10">
        <img src="Imagens/yuri.jpg"/>
      </div>
    </div>

    <div id="feed"></div>

    <div id="side">
      <p id="logo"><i class="fa-brands fa-instagram"></i></p>

      <section class="btntxt">
        <button class="icone"><i class="fa-solid fa-house"></i></button>
        <p class="txt">Página inicial</p>
      </section>

      <section class="btntxt">
        <button class="icone"><i class="fa-solid fa-play"></i></button>
        <p class="txt">Reels</p>
      </section>

      <section class="btntxt">
        <button class="icone"><i class="fa-solid fa-paper-plane"></i></button>
        <p class="txt">Mensagens</p>
      </section>

      <section class="btntxt">
        <button class="icone">
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
        <p class="txt">Pesquisa</p>
      </section>

      <section class="btntxt">
        <button class="icone"><i class="fa-solid fa-compass"></i></button>
        <p class="txt">Explorar</p>
      </section>

      <section class="btntxt">
        <button class="icone"><i class="fa-solid fa-heart"></i></button>
        <p class="txt">Notificações</p>
      </section>

      <section class="btntxt">
        <button class="icone"><i class="fa-solid fa-plus"></i></button>
        <p class="txt">Criar</p>
      </section>

      <section class="btntxt" id="user">
        <button class="icone"><i class="fa-solid fa-circle-user"></i></button>
        <p class="txt">Perfil</p>
      </section>

      <section class="btntxt">
        <button class="icone"><i class="fa-solid fa-bars"></i></button>
        <p class="txt">Mais</p>
      </section>
    </div>

    <div id="sugestoes"></div>
  </body>
</html>
