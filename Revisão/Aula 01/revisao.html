<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercícios JS</title>
</head>
<body>

    <h1>Exercício 1</h1>
    <p id="erro1"></p>
    <input type="number" max="10" min="1" id="prioridade" placeholder="Defina a prioridade da tarefa de 1 a 10" style="width: 13%;">
    <button onclick="criarTarefa()">Criar</button>
    <p id="exercicio1"></p>

    <h1>Exercício 2</h1>
    <p id="erro2"></p>
    <input type="text" id="salario" placeholder="Digite seu salário mensal">
    <input type="text" id="aluguel" placeholder="Digite quanto paga de aluguel mensalmente" style="width: 14%;">
    <input type="text" id="alimentacao" placeholder="Digite quanto paga em alimentação mensalmente" style="width: 16%;">
    <input type="text" id="lazer" placeholder="Digite quanto paga em lazer mensalmente">
    <button onclick="calcular()">Calcular</button>
    <p id="exercicio2"></p>

    <h1>Exercício 3</h1>
    <input type="text" placeholder="Digite seu nome" id="nome">
    <button onclick="formatar()">Formatar</button>
    <p id="exercicio3"></p>

    <h1>Exercício 4 - Contador de Dias para o Evento</h1>
    <input type="date" id="dataEvento">
    <button onclick="contarDias()">Calcular dias</button>
    <p id="exercicio4"></p>

    <h1>Exercício 5 - Varredura de Compromissos</h1>
    <button onclick="verificarCompromissos()">Verificar Agenda</button>
    <p id="exercicio5"></p>

    <script src="1.js"></script>
    <script src="2.js"></script>
    <script src="3.js"></script>
    <script src="4.js"></script>
    <script src="5.js"></script>
</body>
</html>
